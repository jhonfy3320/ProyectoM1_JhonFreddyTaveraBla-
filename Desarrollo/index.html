<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>
        Generador de Paletas Interactivo
    </title>
</head>
<body>
    <header>
        <h1>Generador de Paletas Interactivo</h1>

        <p>Genera combinaciones de colores aleatorias para proyectos visuales,branding y diseño web.</p>
    </header>
    <main>
        <section aria-labelledby="configuracion-paleta">
            <h2 id="configuracion-paleta">
                Configuración de la paleta</h2>
            <form>
                <div>
                    <label for="palette-size">
                        Tamaño de la paleta
                    </label>

                    <select id="palette-size" name="palette-size">

                        <option value="" disabled selected>
                            Selecciona un tamaño
                        </option>
                        <option value="6">6 colores</option>
                        <option value="8">8 colores</option>
                        <option value="9">9 colores</option>
                    </select>
                </div>
                <div>
                    <label for="color-format">
                        Formato de color
                    </label>
                    <select id="color-format" name="color-format">
                        <option value="hex">HEX</option>
                        <option value="rgba">RGBA</option>
                        <option value="hsl">HSL</option>
                    </select>
                </div>
                <button type="button" id="generate-btn">
                    Generar paleta
                </button>
            </form>
        </section>
        <section aria-labelledby="paleta-generada">
            <h2 id="paleta-generada">
                Paleta generada
            </h2>
            <div id="palette-container">
                <!-- JS renderizará dinámicamente las tarjetas -->
            </div>
        </section>
        <!-- Microfeedback -->
        <div id="toast-message" aria-live="polite"></div>
    </main>
    <footer>
        <p>
            Proyecto Integrador M1 - Generador de Paletas Interactivo
        </p>
    </footer>
</body>
</html>
