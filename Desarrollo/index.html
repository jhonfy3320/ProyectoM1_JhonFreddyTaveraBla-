<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Generador de Paletas Interactivo</title>

  <link rel="stylesheet" href="./Styles/style.css">
</head>

<body>

  <div id="app-container">

    <header class="main-header">

      <h1 class="app-title">
        Generador de Paletas Interactivo
      </h1>

      <p class="app-description">
        Genera combinaciones de colores aleatorias para branding,
        diseño web y proyectos visuales.
      </p>

    </header>

    <main class="main-content">

      <section
        class="controls-section"
        aria-labelledby="palette-settings-title"
      >

        <h2 id="palette-settings-title">
          Configuración de la paleta
        </h2>

        <form class="controls-form">

          <div class="form-group">

            <label for="palette-size">
              Tamaño de la paleta
            </label>

            <select
              id="palette-size"
              name="palette-size"
            >
              <option value="6">6 colores</option>
              <option value="8">8 colores</option>
              <option value="9">9 colores</option>
            </select>

          </div>

          <div class="form-group">

            <label for="color-format">
              Formato de color
            </label>

            <select
              id="color-format"
              name="color-format"
            >
              <option value="hex">HEX</option>
              <option value="rgba">RGBA</option>
              <option value="hsl">HSL</option>
            </select>

          </div>

          <button
            type="button"
            id="generate-btn"
            class="generate-btn"
            aria-label="Generar nueva paleta de colores"
          >
            Generar paleta
          </button>

        </form>

      </section>

      <section
        class="palette-section"
        aria-labelledby="generated-palette-title"
      >

        <h2 id="generated-palette-title">
          Paleta generada
        </h2>

        <div
          id="palette-container"
          class="palette-container"
        >

          <p class="empty-message">
            Genera una paleta para visualizar los colores.
          </p>

        </div>

      </section>

    </main>

    <div
      id="toast-message"
      class="toast-message"
      aria-live="polite"
      role="status"
    >
    </div>

    <footer class="main-footer">

      <p>
        Proyecto Integrador M1 -
        Generador de Paletas Interactivo
      </p>

    </footer>

  </div>

  <script src="./js/app.js"></script>

</body>

</html>
