<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Paletas de Colers Interactivo </title>
    <p>Generador de lapetas de colores para lo que quieras ver mas elegante</p>
</head>
<body>
    <head>
        <h1>Generador de Paletas Interactivo</h1>
        <p> Genera combinaciones de colores aleatorias para tus proyectos visuales.</p>
    </head>
    <main>
        <section aria-labelledby="configuracion-paleta">
            <h2 id="Configuracion-paleta">
            Configuracion-paleta
            </h2>
            <div>
                <label for="palette-size">Tamaño de la paleta</label>
                <select id="palette-size" name="palette-size">
                    <option value="" disabled selected>Selecciona un formato</option>
                    <option value="6">6 colores</option>
                    <option value="8">8 colores</option>
                    <option value="9">9 colores</option>
                </select>
            </div>
            <div>
                <label for="color-format">
                    Formato color
                </label>
                <select id="color-format" name="color-format">
                    <option value="hex">HEX</option>
                    <option value="rgba">RGBA</option>
                    <option value="hsl">HSL</option>
                </select>
            </div>
            <button type="button">
                Generar paleta
            </button>
        </section>
        <section aria-labelledby="paleta-generada">
            <h2 id="paleta-generada"></h2>
        </section>
    </main>
    <footer>
        <p> Proyecto Integrador M1- Generador de Paletas de Coloeres Interactivo</p>
    </footer>
</body>
</html>
